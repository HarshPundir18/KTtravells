<section class="page-section">
  <app-section-heading
    eyebrow="Featured journeys"
    title="Flexible packages built around how you travel"
    description="Choose from pilgrimages, hill holidays, beach breaks and curated escapes with clear planning support."
  ></app-section-heading>

  <div class="packages-grid">
    @for (item of packages; track item.title) {
      <article class="package-card">
        <img [src]="item.image" [alt]="item.title" loading="lazy" />
        <div class="package-body">
          <div class="package-meta">
            <span>{{ item.duration }}</span>
            <span class="rating">★ {{ item.rating }}</span>
          </div>
          <h3>{{ item.title }}</h3>
          <p class="location">{{ item.destination }}</p>
          @if (item.origin) {
            <p class="origin">Origin: {{ item.origin }}</p>
          }
          <p>{{ item.description }}</p>
          <div class="package-footer">
            <strong>{{ item.price }}</strong>
            <div class="package-actions">
              <a [routerLink]="['/packages', item.slug]">View Details</a>
              <a routerLink="/contact" [queryParams]="{ package: item.title }">Plan Trip</a>
            </div>
          </div>
        </div>
      </article>
    }
  </div>
</section>
