<section class="page-section">
  <app-section-heading
    eyebrow="Featured Packages"
    title="Curated stays, premium transfers and unforgettable moments"
    description="Choose from more than 250 handpicked tour experiences designed around comfort and local insight."
  ></app-section-heading>

  <div class="packages-grid">
    @for (item of packages; track item.title) {
      <article class="package-card">
        <img [src]="item.image" [alt]="item.title" loading="lazy" />
        <div class="package-body">
          <div class="package-meta">
            <span>{{ item.duration }}</span>
            <span class="rating">★ {{ item.rating }}</span>
          </div>
          <h3>{{ item.title }}</h3>
          <p class="location">{{ item.destination }}</p>
          <p>{{ item.description }}</p>
          <div class="package-footer">
            <strong>{{ item.price }}</strong>
            <a routerLink="/contact">Book Now</a>
          </div>
        </div>
      </article>
    }
  </div>
</section>
