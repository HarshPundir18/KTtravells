<header class="topbar">
  <a class="brand" routerLink="/">
    <img
      class="brand-logo"
      src="assets/images/logo.jpeg"
      alt="KT Travels logo"
      width="44"
      height="44"
    />
    <span class="brand-text">
      <strong>KT Travels</strong>
      <small>Premium journeys, crafted with care</small>
    </span>
  </a>

  <button class="menu-toggle" aria-label="Toggle menu" (click)="toggleMenu()">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </button>

  <nav class="nav-links" aria-label="Primary" [class.open]="isMenuOpen">
    @for (item of menuItems; track item.label) {
      <a
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
        >{{ item.label }}</a
      >
    }
  </nav>

  <a class="book-btn" routerLink="/contact">Book Now</a>
</header>
