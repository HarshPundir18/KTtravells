<div class="app-shell">
  <app-navbar></app-navbar>

  <div *ngIf="isBookingModalVisible" class="booking-modal-overlay" (click)="closeBookingModal()">
    <div class="booking-modal" (click)="$event.stopPropagation()">
      <button class="close-btn" aria-label="Close" (click)="closeBookingModal()">×</button>
      <h3>Book Your Trip</h3>

      <form class="form-card booking-form" (submit)="onBookingSubmit($event)">
        <label>
          <span>Name</span>
          <input name="name" type="text" placeholder="Your name" />
        </label>
        <label>
          <span>Email</span>
          <input name="email" type="email" placeholder="name@example.com" />
        </label>
        <label>
          <span>Phone</span>
          <input name="phone" type="tel" placeholder="Your phone number" />
        </label>
        <label>
          <span>Destination</span>
          <input name="destination" type="text" placeholder="Where do you want to go?" />
        </label>
        <label>
          <span>Cab Preference</span>
          <select name="cab">
            <option value="">Select cab</option>
            <option>Swift Dzire</option>
            <option>Maruti Ertiga</option>
            <option>Innova Crysta</option>
            <option>Mahindra Scorpio</option>
            <option>Mahindra Thar</option>
            <option>Tempo Traveller</option>
          </select>
        </label>
        <label>
          <span>Message</span>
          <textarea name="message" rows="4" placeholder="Tell us about your dream trip"></textarea>
        </label>

        <div class="modal-actions">
          <button type="submit" class="book-now-btn">Send Inquiry</button>
        </div>
      </form>
    </div>
  </div>
  <main>
    <router-outlet></router-outlet>
  </main>
  <app-footer></app-footer>
</div>
