<section class="page-section contact-section">
  <app-section-heading
    eyebrow="Contact"
    title="Let’s plan your next escape"
    description="Reach out for custom tour planning, group travel or urgent bookings."
  ></app-section-heading>

  <div class="contact-grid">
    <div class="contact-card info-card">
      <h3>Visit us</h3>
      <p><strong>Address:</strong> 18, Marina Avenue, Mumbai, India</p>
      <p><strong>Phone:</strong> +91 98765 43210</p>
      <p><strong>Email:</strong> hello@kttravels.com</p>
      <p><strong>Working Hours:</strong> Mon – Sun, 8:00 AM – 10:00 PM</p>
      <div class="map-placeholder">Google Map Placeholder</div>
    </div>

    <form class="contact-card form-card">
      <label>
        <span>Name</span>
        <input type="text" placeholder="Your name" />
      </label>
      <label>
        <span>Email</span>
        <input type="email" placeholder="name@example.com" />
      </label>
      <label>
        <span>Phone</span>
        <input type="tel" placeholder="Your phone number" />
      </label>
      <label>
        <span>Destination</span>
        <input type="text" placeholder="Where do you want to go?" />
      </label>
      <label>
        <span>Message</span>
        <textarea rows="4" placeholder="Tell us about your dream trip"></textarea>
      </label>
      <button type="button">Send Inquiry</button>
    </form>
  </div>
</section>
